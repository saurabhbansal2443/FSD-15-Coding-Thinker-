<style>
  :root {
    --primary-color: #ff4757;
    --text-dark: #2f3542;
    --text-light: #747d8c;
    --bg-card: #ffffff;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f1f2f6;
    display: flex;
    justify-content: center;
    padding: 50px;
  }

  .product-card {
    background: var(--bg-card);
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 350px;
    overflow: hidden;
    transition: transform 0.3s ease;
    position: relative;
  }

  .product-card:hover {
    transform: translateY(-5px);
  }

  .discount-badge {
    position: absolute;
    top: 15px;
    left: 15px;
    background: var(--primary-color);
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    font-weight: bold;
    font-size: 0.8rem;
    z-index: 10;
  }

  .image-container {
    width: 100%;
    height: 250px;
    background-color: #f9f9f9;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-container img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .content {
    padding: 20px;
  }

  .brand {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--text-light);
    letter-spacing: 1px;
    margin-bottom: 5px;
  }

  .title {
    font-size: 1.25rem;
    color: var(--text-dark);
    margin: 0 0 10px 0;
    font-weight: 700;
  }

  .rating {
    color: #ffa502;
    font-size: 0.9rem;
    margin-bottom: 10px;
  }

  .description {
    font-size: 0.9rem;
    color: var(--text-light);
    line-height: 1.4;
    margin-bottom: 15px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .price-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .current-price {
    font-size: 1.5rem;
    font-weight: bold;
    color: var(--text-dark);
  }

  .stock-status {
    font-size: 0.8rem;
    color: #2ed573;
    font-weight: 600;
  }

  .btn-add {
    width: 100%;
    background: var(--text-dark);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-add:hover {
    background: #000;
  }
</style>

<div class="product-card">
  <div class="discount-badge">10.48% OFF</div>
  
  <div class="image-container">
    <img src="https://cdn.dummyjson.com/product-images/beauty/essence-mascara-lash-princess/1.webp" alt="Essence Mascara">
  </div>

  <div class="content">
    <div class="brand">Essence | SKU: BEA-ESS-ESS-001</div>
    <h2 class="title">{{--tittle--}}</h2>
    
    <div class="rating">
      ★ 2.56 <span style="color: #747d8c;">(3 Reviews)</span>
    </div>

    <p class="description">
      {{--description--}}
    </p>

    <div class="price-row">
      <span class="current-price">$9.99</span>
      <span class="stock-status">● In Stock (99)</span>
    </div>

    <button class="btn-add">Add to Cart</button>
  </div>
</div>
